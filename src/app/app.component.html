@if (authService.isImpersonating()) {
	<div class="impersonation-banner d-flex align-items-center justify-content-center gap-2">
		<i class="bi bi-incognito"></i>
		<span>Estás operando como <strong>{{ authService.currentUser()?.tenant?.name }}</strong>.</span>
		<button type="button" class="btn btn-sm btn-light" (click)="returnToSuperAdmin()">Volver a Super Admin</button>
	</div>
}
<div class="row">
	<div class="col-12">
		<router-outlet />
	</div>
</div>
