<h1 class="text-center">QR Scanner</h1>

<div class="row d-flex my-3" style="height: 80vh ;">
    <div class="col-8 d-flex justify-content-center align-items-center border-end">
        <form class="d-flex justify-content-center" [formGroup]="scannerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <input type="text" class="form-control" formControlName="code" placeholder="Enter QR Code" />
            </div>
            <button type="button" class="btn btn-primary btn-sm mx-1"><i class="bi bi-qr-code" aria-hidden="true"></i>
                Scan
                Code</button>
            <button type="submit" class="btn btn-success btn-sm mx-1" [disabled]="scannerForm.controls.code.invalid"><i class="bi bi-check" aria-hidden="true"></i>
                Validate Code</button>
        </form>
    </div>
    <div class="col-4 ">
        <h5 class="text-center">Last Actions</h5>

        <div style="height: 80vh;" class="overflow-y-auto">
            @for (action of lastActions(); track $index) {
            <div class="alert alert-secondary" role="alert">
                {{action}}
            </div>
            }
        </div>



    </div>
</div>
