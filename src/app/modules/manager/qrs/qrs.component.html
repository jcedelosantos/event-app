<h1>QR Scanner</h1>

<div class="row my-3">
    <div class="col-sm-2">
        <a class="btn btn-primary" [routerLink]="['/manager/events/qr-scanner']"><i class="bi bi-qr-code"
                aria-hidden="true"></i> Qr Scanner</a>
    </div>
</div>

<table class="table table-striped  table-hover">
    <thead>
        <tr>
            <th>User</th>
            <th>Client</th>
            <th>Date</th>
            <th>Events</th>
            <th>Price</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for (qr of qrList(); track $index) {
        <tr>
            <td scope="row">{{qr.user.username}}</td>
            <td scope="row">{{qr.client}}</td>
            <td scope="row">{{qr.date | date: 'short'}}</td>
            <td scope="row">{{qr.events.name}}</td>
            <td scope="row">{{qr.price}}</td>
            <td scope="row">
                    <button class="btn btn-primary btn-sm" (click)="openDetailModal(qr)">
                        <i class="bi bi-eye" aria-hidden="true"></i> View
                    </button>
            </td>
        </tr>
        }
    </tbody>
</table>


<app-event-detail-modal [eventDetail]="selectedDetail()" />
