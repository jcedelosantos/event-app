<h1>QR Scanner</h1>

<div class="row my-3">
    <div class="col-sm-2">
        <a class="btn btn-primary" [routerLink]="['/manager/events/qr-scanner']"><i class="bi bi-qr-code"
                aria-hidden="true"></i> Qr Scanner</a>
    </div>
    <div class="col-sm-3">
        <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#createQrModal">
            <i class="bi bi-plus-circle" aria-hidden="true"></i> Vender ticket / Generar QR
        </button>
    </div>
</div>

<table class="table table-striped  table-hover">
    <thead>
        <tr>
            <th>Seller</th>
            <th>Client</th>
            <th>Date</th>
            <th>Event</th>
            <th>Price</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        @for (qr of qrList(); track qr.id) {
        <tr>
            <td scope="row">{{qr.seller.username}}</td>
            <td scope="row">{{qr.client.name}} {{qr.client.lastname}}</td>
            <td scope="row">{{qr.dateSold | date: 'short'}}</td>
            <td scope="row">{{qr.event.name}}</td>
            <td scope="row">{{qr.ticket.price}}</td>
            <td scope="row">
                    <button class="btn btn-primary btn-sm me-2" (click)="openDetailModal(qr)">
                        <i class="bi bi-eye" aria-hidden="true"></i> View
                    </button>
                    <button class="btn btn-dark btn-sm" (click)="deleteQR(qr)">
                        <i class="bi bi-x-lg" aria-hidden="true"></i>
                    </button>
            </td>
        </tr>
        } @empty {
        <tr>
            <td colspan="6" class="text-muted">Todavía no hay ventas registradas.</td>
        </tr>
        }
    </tbody>
</table>


<app-event-detail-modal [eventDetail]="selectedDetail()" />
<create-qr-modal (qrCreated)="onQrCreated($event)" />
